<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Sword blade -->
  <line x1="24" y1="6" x2="24" y2="36" stroke="#00d4e8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crossguard -->
  <line x1="14" y1="20" x2="34" y2="20" stroke="#00d4e8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="24" y1="36" x2="24" y2="43" stroke="#8b95a8" stroke-width="2" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="24" cy="43" r="2" fill="#00d4e8"/>
  <!-- Tip glow -->
  <circle cx="24" cy="6" r="1.5" fill="#00e5ff"/>
  <!-- XP star left -->
  <circle cx="12" cy="30" r="1.5" fill="#00d4e8" opacity="0.6"/>
  <!-- XP star right -->
  <circle cx="36" cy="30" r="1.5" fill="#00d4e8" opacity="0.6"/>
</svg>
