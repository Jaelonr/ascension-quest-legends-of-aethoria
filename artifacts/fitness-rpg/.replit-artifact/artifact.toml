kind = "web"
previewPath = "/"
title = "Fitness RPG"
version = "1.0.0"
id = "fitness-rpg"

[[services]]
localPort = 8081
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fitness-rpg run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/fitness-rpg", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8081"
NODE_ENV = "production"
